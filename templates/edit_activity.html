{% extends "base.html" %}
{% block title %}Edit Activity | Eknal Technologies{% endblock %}
{% block content %}
<div class="flex-grow flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-xl w-full max-w-lg">
    <h2 class="text-2xl font-bold mb-6 text-indigo-700 text-center">Edit Activity</h2>
    <form method="post"
      enctype="multipart/form-data"
      class="space-y-5">

  <input type="hidden"
         name="csrf_token"
         value="{{ csrf_token() }}">

  <div>
    <label for="title"
           class="block text-sm font-medium mb-2">
      Title
    </label>
        <input type="text" name="title" id="title" required value="{{ activity.title }}" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="description" class="block text-sm font-medium mb-2">Description</label>
        <textarea name="description" id="description" rows="5" required class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none resize-y">{{ activity.description }}</textarea>
      </div>
      <div>
        <label for="date" class="block text-sm font-medium mb-2">Date</label>
        <input type="date" name="date" id="date" required value="{{ activity.date }}" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      {% if activity.image %}
      <div>
        <p class="text-sm font-medium mb-2">Current Image</p>
        <img src="{{ url_for('static', filename='uploads/' + activity.image) }}" alt="Current  for {{ activity.title }}" class="w-full h-40 object-cover rounded-lg border mb-2">
      </div>
      {% endif %}
      <div>
        <label for="image" class="block text-sm font-medium mb-2">Replace Image <span class="text-gray-400 font-normal">(optional)</span></label>
        <input type="file" name="image" id="image" accept="image/*" class="w-full border px-4 py-3 rounded-lg bg-white focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div class="flex justify-end gap-3">
        <a href="{{ url_for('post_activity') }}" class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">Back</a>
        <button type="submit" class="px-5 py-2 rounded-lg text-white font-semibold bg-gradient-to-r from-orange-500 to-yellow-500 hover:from-yellow-500 hover:to-orange-500 transition">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
