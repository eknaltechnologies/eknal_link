{% extends "base.html" %}
{% block title %}Request Profile Edit{% endblock %}


{% block content %}
<div class="flex-grow flex items-center justify-center px-4 pt-28 pb-12 relative z-10">
  <div class="bg-white/85 backdrop-blur rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/60">

    <div class="text-center mb-7">
      <div class="w-14 h-14 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-indigo-700">Request Profile Edit</h2>
      <p class="text-gray-500 text-sm mt-1">Enter your registered email to receive a verification code</p>
    </div>

    <form method="post" id="otpForm" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input type="email" name="email" id="email" required
               class="w-full border border-gray-200 px-4 py-2.5 rounded-xl text-sm text-center
                      focus:ring-2 focus:ring-indigo-400 outline-none transition"
               placeholder="you@example.com">
      </div>

      <button id="sendBtn" type="submit"
              class="w-full py-2.5 rounded-xl font-semibold text-white shadow
                     bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500
                     hover:from-yellow-500 hover:via-orange-500 hover:to-amber-500
                     transition flex items-center justify-center gap-2">
        <span id="btnText">Send OTP</span>
        <svg id="spinner" class="hidden w-5 h-5 animate-spin" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" opacity="0.25"></circle>
          <path fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
        </svg>
      </button>

      <p class="text-xs text-center text-gray-400">This may take a few seconds while we send your OTP.</p>
    </form>

  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const form = document.getElementById("otpForm");
const btn  = document.getElementById("sendBtn");
const text = document.getElementById("btnText");
const spin = document.getElementById("spinner");
form.addEventListener("submit", () => {
  btn.disabled = true;
  btn.classList.add("opacity-70", "cursor-not-allowed");
  text.textContent = "Sending...";
  spin.classList.remove("hidden");
});
</script>
{% endblock %}
