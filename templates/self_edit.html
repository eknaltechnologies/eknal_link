{% extends "base.html" %}
{% block title %}Edit Profile | Eknal Technologies{% endblock %}
{% block content %}
<div class="flex-grow flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="bg-white/80 backdrop-blur rounded-2xl shadow-xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-indigo-700 text-center mb-6">Update Your Profile</h2>
    <form method="post"
      enctype="multipart/form-data"
      class="space-y-4">

  <input type="hidden"
         name="csrf_token"
         value="{{ csrf_token() }}">

  <div class="flex flex-col items-center mb-4">
        {% if collaborator.photo %}
        <img src="{{ url_for('static', filename='uploads/' + collaborator.photo) }}" class="w-28 h-28 rounded-full object-cover border-4 border-indigo-200 shadow-md mb-3" alt="Profile of {{ collaborator.name }}">
        {% else %}
        <div class="w-28 h-28 rounded-full bg-indigo-100 border-4 border-indigo-200 shadow-md mb-3 flex items-center justify-center text-3xl font-bold text-indigo-400">{{ collaborator.name[0]|upper }}</div>
        {% endif %}
        <label for="photo" class="text-sm font-medium text-gray-600 mb-1">Upload Profile Photo</label>
        <input type="file" name="photo" id="photo" accept="image/*" class="w-full border px-3 py-2 rounded-lg bg-white">
      </div>
      <div>
        <label for="name" class="block text-sm font-medium mb-1">Name</label>
        <input type="text" name="name" id="name" required value="{{ collaborator.name }}" class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="email" class="block text-sm font-medium mb-1">Email</label>
        <input type="email" name="email" id="email" readonly value="{{ collaborator.email }}" class="w-full border px-3 py-2 rounded-lg bg-gray-50 text-gray-500 cursor-not-allowed">
      </div>
      <div>
        <label for="resume" class="block text-sm font-medium mb-1">Resume URL</label>
        <input type="url" name="resume" id="resume" required value="{{ collaborator.resume_url }}" class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="contribution" class="block text-sm font-medium mb-1">Contribution</label>
        <input type="text" name="contribution" id="contribution" required value="{{ collaborator.contribution }}" class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500 hover:from-yellow-500 hover:via-orange-500 hover:to-amber-500 transition">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
