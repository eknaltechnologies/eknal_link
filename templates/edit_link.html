{% extends "base.html" %}
{% block title %}Edit Link | Eknal Technologies{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="w-full max-w-md bg-white/80 backdrop-blur rounded-2xl shadow-xl p-8">
    <h2 class="text-2xl font-bold text-indigo-700 text-center mb-2">Edit Link</h2>
    <p class="text-sm text-gray-600 text-center mb-6">Update your link information below</p>
   <form method="post" class="space-y-5">

  <input type="hidden"
         name="csrf_token"
         value="{{ csrf_token() }}">

  <div>
    <label for="title"
           class="block text-sm font-medium mb-2">
      Link Title
    </label>
        <input type="text" name="title" id="title" value="{{ link.title }}" required placeholder="Enter link title" class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-indigo-400 outline-none text-sm">
      </div>
      <div>
        <label for="url" class="block text-sm font-medium mb-2">Link URL</label>
        <input type="url" name="url" id="url" value="{{ link.url }}" required placeholder="https://example.com" class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-indigo-400 outline-none text-sm">
      </div>
      <div class="flex justify-end gap-3">
        <a href="{{ url_for('dashboard') }}" class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">Back</a>
        <button type="submit" class="px-5 py-2 rounded-lg font-semibold text-white bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500 hover:from-yellow-500 hover:via-orange-500 hover:to-amber-500 transition">Save Changes</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
