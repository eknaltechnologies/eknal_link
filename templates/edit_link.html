{% extends "base.html" %}
{% block title %}Edit Link{% endblock %}

{% block content %}
<div class="flex-grow flex items-center justify-center px-4 pt-28 pb-12 relative z-10">
  <div class="bg-white/85 backdrop-blur rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/60">

    <h2 class="text-2xl font-bold text-indigo-700 text-center mb-2">Edit Link</h2>
    <p class="text-sm text-gray-500 text-center mb-6">Update the title or URL below</p>

    <form method="post" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
        <input type="text" name="title" id="title" required
               value="{{ link.title }}"
               class="w-full border border-gray-200 px-4 py-2.5 rounded-xl text-sm
                      focus:ring-2 focus:ring-indigo-400 outline-none transition">
      </div>

      <div>
        <label for="url" class="block text-sm font-medium text-gray-700 mb-1">URL</label>
        <input type="url" name="url" id="url" required
               value="{{ link.url }}"
               class="w-full border border-gray-200 px-4 py-2.5 rounded-xl text-sm
                      focus:ring-2 focus:ring-indigo-400 outline-none transition">
      </div>

      <div class="flex gap-3 pt-1">
        <a href="{{ url_for('dashboard') }}"
           class="flex-1 py-2.5 rounded-xl text-center font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200 transition text-sm">
          Cancel
        </a>
        <button type="submit"
                class="flex-1 py-2.5 rounded-xl font-semibold text-white shadow
                       bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500
                       hover:from-yellow-500 hover:via-orange-500 hover:to-amber-500 transition text-sm">
          Save Changes
        </button>
      </div>
    </form>

  </div>
</div>
{% endblock %}
