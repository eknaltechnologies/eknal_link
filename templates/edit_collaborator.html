<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Edit Collaborator | Eknal Link</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-white text-slate-900 overflow-x-hidden">

  <nav class="sticky top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-8">
          <a href="/admin-entry" class="block hover:opacity-80 transition-opacity">
            <img src="/static/eknal_link.png" alt="Logo" class="h-8">
          </a>
          <div class="hidden sm:flex items-center gap-4 text-sm font-medium">
            <a href="/" class="text-slate-400 hover:text-slate-900 transition-colors">Resources</a>
            <span class="text-slate-200">/</span>
            <a href="/collaborators" class="text-slate-400 hover:text-slate-900 transition-colors">Collaborators</a>
            <span class="text-slate-200">/</span>
            <span class="text-slate-900">Edit Profile</span>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow w-full flex flex-col items-center justify-center px-6 py-12 bg-slate-50/50">

    <div class="w-full max-w-lg bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">

      <div class="px-8 pt-8 pb-6 border-b border-slate-100 flex justify-between items-start">
        <div>
          <h2 class="text-2xl font-bold tracking-tight text-slate-900">Edit Profile</h2>
          <p class="text-slate-500 text-sm mt-1">Modify collaborator details and permissions.</p>
        </div>
        <div class="p-3 bg-slate-50 rounded-xl text-slate-400">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
          </svg>
        </div>
      </div>

      <form id="updateForm" method="post" class="p-8 space-y-6">

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700">Full Name</label>
          <input type="text" name="name" value="{{ collaborator.name }}" required
            class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 text-sm focus:ring-2 focus:ring-slate-950 focus:border-slate-950 outline-none transition-all shadow-sm">
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700">Email Address</label>
          <input type="email" name="email" value="{{ collaborator.email }}" required
            class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 text-sm focus:ring-2 focus:ring-slate-950 focus:border-slate-950 outline-none transition-all shadow-sm">
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700">Resume / Portfolio URL</label>
          <input type="url" name="resume" value="{{ collaborator.resume_url }}" required
            class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 text-sm focus:ring-2 focus:ring-slate-950 focus:border-slate-950 outline-none transition-all shadow-sm">
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-semibold text-slate-700">Key Contribution</label>
          <textarea name="contribution" required rows="3"
            class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-900 text-sm focus:ring-2 focus:ring-slate-950 focus:border-slate-950 outline-none transition-all shadow-sm resize-none">{{ collaborator.contribution }}</textarea>
        </div>

        <div class="flex items-center justify-between pt-6 border-t border-slate-100">
          <button type="button"
            onclick="if(confirm('Delete this profile forever?')) document.getElementById('deleteForm').submit();"
            class="text-sm font-semibold text-red-500 hover:text-red-700 transition-colors">
            Delete Profile
          </button>

          <div class="flex items-center gap-4">
            <a href="/collaborators"
              class="text-sm font-semibold text-slate-500 hover:text-slate-900 transition-colors">
              Cancel
            </a>
            <button type="submit"
              class="px-6 py-2.5 bg-slate-950 text-white text-sm font-semibold rounded-lg hover:bg-slate-800 shadow-sm active:scale-[0.98] transition-all">
              Save Changes
            </button>
          </div>
        </div>
      </form>

      <form id="deleteForm" action="/delete-collaborator/{{ collaborator.id }}" method="post" class="hidden"></form>
    </div>

    <div class="mt-8">
      <a href="/collaborators"
        class="text-sm font-medium text-slate-400 hover:text-slate-900 flex items-center gap-2 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Directory
      </a>
    </div>
  </main>

  <footer class="bg-white border-t border-slate-200 py-6 mt-12">
    <div
      class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4 text-xs font-medium tracking-tight">

      <div class="flex items-center gap-4">
        <span class="text-slate-900 font-bold">Eknal Technologies</span>
        <span class="text-slate-300">|</span>
        <span class="text-slate-400">&copy; 2026 Internal Portal</span>
      </div>

      <div class="text-slate-400">
        Developed by
        <a href="https://www.linkedin.com/in/vaigandladurgesh/" target="_blank" class="text-slate-900 hover:underline">
          Durgesh Vaigandla (React Developer Intern)
        </a>
      </div>

      <div class="flex gap-4">
        <a href="https://eknaltechnologies.in" target="_blank"
          class="text-slate-400 hover:text-slate-900 transition-colors">Official Website</a>
        <a href="/admin-entry" class="text-slate-400 hover:text-slate-900 transition-colors">Admin Entry</a>
      </div>

    </div>
  </footer>

</body>

</html>
