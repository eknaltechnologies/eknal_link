{% extends "base.html" %}
{% block title %}Edit Collaborator | Eknal Technologies{% endblock %}
{% block content %}
<div class="flex-grow flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-indigo-700 text-center">Edit Collaborator</h2>
   <form id="updateForm"
      method="post"
      class="space-y-5">

  <input type="hidden"
         name="csrf_token"
         value="{{ csrf_token() }}">

  <div>
    <label for="name"
           class="block text-sm font-medium mb-2">
      Name
    </label>
        <input type="text" name="name" id="name" required value="{{ collaborator.name }}" class="w-full border border-gray-300 px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="email" class="block text-sm font-medium mb-2">Email</label>
        <input type="email" name="email" id="email" required value="{{ collaborator.email }}" class="w-full border border-gray-300 px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="resume" class="block text-sm font-medium mb-2">Resume URL</label>
        <input type="url" name="resume" id="resume" required value="{{ collaborator.resume_url }}" class="w-full border border-gray-300 px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="contribution" class="block text-sm font-medium mb-2">Contribution</label>
        <input type="text" name="contribution" id="contribution" required value="{{ collaborator.contribution }}" class="w-full border border-gray-300 px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="contribution_type" class="block text-sm font-medium mb-2">Contribution Type</label>
        <select name="contribution_type" id="contribution_type" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none bg-white">
          {% for t in types %}
          <option value="{{ t.id }}" {% if collaborator.contribution_type_id == t.id %}selected{% endif %}>{{ t.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="linkedin" class="block text-sm font-medium mb-2">LinkedIn</label>
        <input type="url" name="linkedin" id="linkedin" value="{{ collaborator.linkedin or '' }}" class="w-full border border-gray-300 px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="github" class="block text-sm font-medium mb-2">GitHub</label>
        <input type="url" name="github" id="github" value="{{ collaborator.github or '' }}" class="w-full border border-gray-300 px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="source" class="block text-sm font-medium mb-2">Source</label>
        <input type="text" name="source" id="source" value="{{ collaborator.source or '' }}" class="w-full border border-gray-300 px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <hr class="my-4">
      <div class="flex justify-end gap-3">
        <a href="{{ url_for('collaborators') }}" class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">Back</a>
        <button type="submit" class="px-5 py-2 rounded-lg bg-gradient-to-r from-orange-500 to-yellow-500 text-white font-semibold hover:from-yellow-500 hover:to-orange-500 transition">Update</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
