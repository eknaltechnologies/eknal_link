{% extends "base.html" %}
{% block title %}New Role | Eknal Technologies{% endblock %}
{% block content %}
<div class="flex-grow flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-indigo-700 text-center">New Role</h2>
    <form method="post"
      class="space-y-5"
      id="roleForm">

  <input type="hidden"
         name="csrf_token"
         value="{{ csrf_token() }}">

  <div>
    <label for="role_name"
           class="block text-sm mb-2">
      Role
    </label>
        <input type="text" name="role_name" id="role_name" required autofocus placeholder="Enter role name" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="description" class="block text-sm mb-2">Description</label>
        <textarea name="description" id="description" rows="4" placeholder="Enter role description" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"></textarea>
      </div>
      <fieldset>
        <legend class="block text-sm mb-3">Access Permissions</legend>
        <div class="grid grid-cols-2 gap-3 text-sm">
          <label class="flex items-center gap-2" for="access_read">
            <input type="checkbox" name="access" id="access_read" value="read" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">Read
          </label>
          <label class="flex items-center gap-2" for="access_write">
            <input type="checkbox" name="access" id="access_write" value="write" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">Write
          </label>
          <label class="flex items-center gap-2" for="access_update">
            <input type="checkbox" name="access" id="access_update" value="update" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">Update
          </label>
          <label class="flex items-center gap-2" for="access_delete">
            <input type="checkbox" name="access" id="access_delete" value="delete" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">Delete
          </label>
        </div>
        <p class="text-xs text-gray-500 mt-3">Select one or more permissions for this role.</p>
      </fieldset>
      <hr class="my-4">
      <div class="flex justify-end gap-3">
        <a href="{{ url_for('dashboard') }}" class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">Back</a>
        <button type="submit" class="px-5 py-2 rounded-lg bg-gradient-to-r from-orange-500 to-yellow-500 text-white font-semibold hover:from-yellow-500 hover:to-orange-500 transition">New Role</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
