{% extends "base.html" %}
{% block title %}Add File | Eknal Technologies{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="w-full max-w-md bg-white/80 backdrop-blur p-8 rounded-2xl shadow-xl space-y-6">
    <h2 class="text-2xl font-bold text-indigo-700 text-center">Upload New File</h2>
    <form method="post" enctype="multipart/form-data" class="space-y-5">
      <div>
        <label for="title" class="block mb-2 text-sm font-medium text-gray-700">Title</label>
        <input type="text" name="title" id="title" required placeholder="Enter file title" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      </div>
      <div>
        <label for="file" class="block mb-2 text-sm font-medium text-gray-700">Choose File</label>
        <input type="file" name="file" id="file" required class="w-full px-4 py-3 border rounded-lg bg-white focus:ring-2 focus:ring-indigo-400 focus:outline-none">
      </div>
      <div class="flex justify-end gap-3">
        <a href="{{ url_for('dashboard') }}" class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">Back</a>
        <button type="submit" class="px-5 py-2 rounded-lg bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold hover:opacity-90 transition">Upload</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
