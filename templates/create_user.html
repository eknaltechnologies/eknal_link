{% extends "base.html" %}
{% block title %}New User | Eknal Technologies{% endblock %}
{% block content %}
<div class="flex-grow flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-indigo-700 text-center">New User</h2>
    <form method="post" class="space-y-5" id="userForm">
      <div>
        <label for="name" class="block text-sm mb-2">Name</label>
        <input type="text" name="name" id="name" required autofocus placeholder="Enter full name" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="username" class="block text-sm mb-2">User Name</label>
        <input type="text" name="username" id="username" required autocomplete="username" placeholder="Enter user name" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="email" class="block text-sm mb-2">Email</label>
        <input type="email" name="email" id="email" required placeholder="example@email.com" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="role_id" class="block text-sm mb-2">Role</label>
        <select name="role_id" id="role_id" required class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none bg-white">
          <option value="" disabled selected>Select role</option>
          {% for t in roles %}
          <option value="{{ t.id }}">{{ t.name }}</option>
          {% endfor %}
        </select>
      </div>
      <hr class="my-4">
      <div class="flex justify-end gap-3">
        <a href="{{ url_for('dashboard') }}" class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">Back</a>
        <button type="submit" class="px-5 py-2 rounded-lg bg-gradient-to-r from-orange-500 to-yellow-500 text-white font-semibold hover:from-yellow-500 hover:to-orange-500 transition">New User</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
