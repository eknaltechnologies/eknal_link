{% extends "base.html" %}
{% block title %}Admin Login | Eknal Technologies{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-xl w-full max-w-sm">
    <h2 class="text-2xl font-bold text-indigo-700 text-center mb-6">Admin Login</h2>
    <form method="post" class="space-y-5">

  <input type="hidden"
         name="csrf_token"
         value="{{ csrf_token() }}">

  <div>
    <label for="username"
           class="block text-sm font-medium mb-2">
      Username
    </label>
        <input type="text" name="username" id="username" required autocomplete="username" placeholder="Enter admin username" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium mb-2">Password</label>
        <input type="password" name="password" id="password" required autocomplete="current-password" placeholder="Enter password" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div class="flex justify-end gap-3">
        <a href="{{ url_for('resources') }}" class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">Back</a>
        <button type="submit" class="px-5 py-2 rounded-lg text-white font-semibold bg-gradient-to-r from-orange-500 to-yellow-500 hover:from-yellow-500 hover:to-orange-500 transition">Login</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
