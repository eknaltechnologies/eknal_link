<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>New Collaborator | Eknal Link</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-slate-50/50 text-slate-900 overflow-x-hidden">

  <nav class="sticky top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-8">
          <a href="/" class="block hover:opacity-80 transition-opacity">
            <img src="{{ url_for('static', filename='eknal_link.png') }}" alt="Logo" class="h-8">
          </a>
          <div class="hidden sm:flex items-center gap-4 text-sm font-medium">
            <a href="{{ url_for('dashboard') }}"
              class="text-slate-400 hover:text-slate-900 transition-colors">Dashboard</a>
            <span class="text-slate-200">/</span>
            <a href="/collaborators" class="text-slate-400 hover:text-slate-900 transition-colors">Collaborators</a>
            <span class="text-slate-200">/</span>
            <span class="text-slate-900">Add New</span>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow w-full flex flex-col items-center justify-center px-6 py-12">

    <div
      class="w-full max-w-lg bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden animate-in fade-in zoom-in-95 duration-500">

      <div class="px-10 pt-10 pb-6 border-b border-slate-50">
        <h2 class="text-2xl font-bold tracking-tight text-slate-900">New Collaborator</h2>
        <p class="text-slate-500 text-sm mt-1">Add a new developer to the project ecosystem.</p>
      </div>

      <form method="post" id="collabForm" class="p-10 space-y-6">

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Full Name</label>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-slate-900 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <input type="text" name="name" required autofocus placeholder="Enter the full name"
              class="w-full pl-11 pr-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-900 text-sm focus:ring-4 focus:ring-slate-100 focus:border-slate-900 outline-none transition-all">
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-slate-900 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <input type="email" name="email" required placeholder="Enter the professional email"
              class="w-full pl-11 pr-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-900 text-sm focus:ring-4 focus:ring-slate-100 focus:border-slate-900 outline-none transition-all">
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Resume / Portfolio URL</label>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-slate-900 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
              </svg>
            </div>
            <input type="url" name="resume" required placeholder="Enter the portfolio or resume link"
              class="w-full pl-11 pr-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-900 text-sm focus:ring-4 focus:ring-slate-100 focus:border-slate-900 outline-none transition-all">
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Core Contribution</label>
          <div class="relative group">
            <div
              class="absolute top-3 left-4 pointer-events-none text-slate-400 group-focus-within:text-slate-900 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
              </svg>
            </div>
            <textarea name="contribution" required rows="3" placeholder="Briefly describe the key contributions..."
              class="w-full pl-11 pr-4 py-3 bg-white border border-slate-300 rounded-xl text-slate-900 text-sm focus:ring-4 focus:ring-slate-100 focus:border-slate-900 outline-none transition-all resize-none"></textarea>
          </div>
        </div>

        <div class="flex items-center justify-end gap-4 pt-6 border-t border-slate-50">
          <a href="/collaborators" class="text-sm font-bold text-slate-400 hover:text-slate-900 transition-colors">
            Cancel
          </a>
          <button type="submit"
            class="px-8 py-3 bg-slate-900 text-white text-sm font-bold rounded-xl shadow-xl shadow-slate-100 hover:bg-slate-800 transform active:scale-[0.98] transition-all">
            Create Profile
          </button>
        </div>

      </form>
    </div>

    <div class="mt-8">
      <a href="/collaborators"
        class="text-sm font-medium text-slate-400 hover:text-slate-900 flex items-center gap-2 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Directory
      </a>
    </div>
  </main>

  <footer class="bg-white border-t border-slate-200 py-6 mt-12">
    <div
      class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4 text-xs font-medium tracking-tight">

      <div class="flex items-center gap-4">
        <span class="text-slate-900 font-bold">Eknal Technologies</span>
        <span class="text-slate-300">|</span>
        <span class="text-slate-400">&copy; 2026 Internal Portal</span>
      </div>

      <div class="text-slate-400">
        Developed by
        <a href="https://www.linkedin.com/in/vaigandladurgesh/" target="_blank" class="text-slate-900 hover:underline">
          Durgesh Vaigandla (React Developer Intern)
        </a>
      </div>

      <div class="flex gap-4">
        <a href="https://eknaltechnologies.in" target="_blank"
          class="text-slate-400 hover:text-slate-900 transition-colors">Official Website</a>
        <a href="/admin-entry" class="text-slate-400 hover:text-slate-900 transition-colors">Admin Entry</a>
      </div>

    </div>
  </footer>

</body>

</html>
