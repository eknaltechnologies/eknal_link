{% extends "base.html" %}
{% block title %}New Collaborator | Eknal Technologies{% endblock %}
{% block content %}
<div class="flex-grow flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-indigo-700 text-center">New Collaborator</h2>
    <form method="post" class="space-y-4" id="collabForm">
      <div>
        <label for="name" class="block text-sm mb-1">Name</label>
        <input type="text" name="name" id="name" required autofocus placeholder="Enter full name" class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="email" class="block text-sm mb-1">Email</label>
        <input type="email" name="email" id="email" required placeholder="example@email.com" class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="resume" class="block text-sm mb-1">Resume URL</label>
        <input type="url" name="resume" id="resume" required placeholder="https://drive.google.com/..." class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="contribution" class="block text-sm mb-1">Contribution</label>
        <input type="text" name="contribution" id="contribution" required placeholder="Worked on backend, UI, database..." class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="contribution_type" class="block text-sm mb-1">Contribution Type</label>
        <select name="contribution_type" id="contribution_type" required class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none bg-white">
          <option value="" disabled selected>Select contribution type</option>
          {% for t in types %}
          <option value="{{ t.id }}">{{ t.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="linkedin" class="block text-sm mb-1">LinkedIn</label>
        <input type="url" name="linkedin" id="linkedin" placeholder="https://linkedin.com/in/username" class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="github" class="block text-sm mb-1">GitHub</label>
        <input type="url" name="github" id="github" placeholder="https://github.com/username" class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div>
        <label for="source" class="block text-sm mb-1">Source</label>
        <input type="text" name="source" id="source" placeholder="WhatsApp, LinkedIn, Instagram..." class="w-full border px-3 py-2 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <hr class="my-4">
      <div class="flex justify-end gap-3">
        <a href="{{ url_for('collaborators') }}" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 transition">Back</a>
        <button type="submit" class="px-4 py-2 bg-gradient-to-r from-orange-500 to-yellow-500 text-white rounded-lg font-semibold hover:from-yellow-500 hover:to-orange-500 transition">New Collaborator</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
