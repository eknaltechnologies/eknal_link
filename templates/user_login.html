<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eknal Link | New Collaborator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-b from-blue-50 via-white to-indigo-100 text-gray-900 relative overflow-x-hidden">

<!-- Background Pattern -->
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-5 pointer-events-none"></div>

<!-- Logo -->
<div class="absolute top-4 left-4 z-20">
  <img src="{{ url_for('static', filename='eknal_link.png') }}"
       class="h-8 sm:h-12">
</div>

<!-- Main Content -->
<div class="flex-grow flex items-center justify-center px-4 pt-24 pb-12 relative z-10">

<div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-xl w-full max-w-md">

<h2 class="text-2xl font-bold mb-6 text-indigo-700 text-center">

Login Now
</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="mb-4 space-y-2">
       {% for category, message in messages %}
       <div class="px-4 py-2 rounded-lg text-sm
              {% if category == 'success' %}bg-green-100 text-green-700 border border-green-300{% endif %}
              {% if category == 'danger' %}bg-red-100 text-red-700 border border-red-300{% endif %}
              {% if category == 'warning' %}bg-yellow-100 text-yellow-700 border border-yellow-300{% endif %}
              {% if category not in ['success', 'danger', 'warning'] %}bg-blue-100 text-blue-700 border border-blue-300{% endif %}">
              {{ message }}
       </div>
       {% endfor %}
</div>
{% endif %}
{% endwith %}

<form method="post" class="space-y-4" id="collabForm">

<!-- User Name -->
<div>
<label class="block text-sm mb-1">User Name</label>
<input type="text" name="username" required autofocus
       placeholder="Enter user name"
       class="w-full border px-3 py-2 rounded-lg
              focus:ring-2 focus:ring-indigo-400 outline-none">
</div>

<!-- Password -->
<div>
<label class="block text-sm mb-1">Password</label>
<input type="password" name="password" required
       placeholder="Enter password"
       class="w-full border px-3 py-2 rounded-lg
              focus:ring-2 focus:ring-indigo-400 outline-none">
</div>

<div>
<a href="{{url_for('forgot_password', _external=True)}}" class="block text-sm mb-1">Forgot password</a>
</div>

<button type="submit"
        class="px-4 py-2 bg-gradient-to-r from-orange-500 to-yellow-500
               text-white rounded-lg font-semibold">
Login
</button>

</div>

</form>

</div>

</div>

<!-- Footer -->
<footer class="text-center text-gray-500 text-xs sm:text-sm z-10 py-4 mt-auto border-t border-gray-300 w-full px-4">
<p>
  Developed by
  <a href="https://www.linkedin.com/in/shalem-raj-putta-054388295/"
     target="_blank"
     class="text-indigo-600 font-semibold hover:underline">
    Shalem Raj (Python Intern)
  </a>
  at
  <a href="https://eknaltechnologies.in"
     target="_blank"
     class="text-indigo-600 font-semibold hover:underline">
    Eknal Technologies
  </a>.
</p>
</footer>
</body>
</html>
