<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center
             bg-gradient-to-b from-blue-50 via-white to-indigo-100">

<!-- Background pattern -->
<div class="absolute inset-0
     bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]
     opacity-10 pointer-events-none"></div>

<!-- Card -->
<div class="bg-white/80 backdrop-blur
            p-8 rounded-2xl shadow-xl
            w-full max-w-sm relative z-10">

  <h2 class="text-2xl font-bold text-indigo-700 text-center mb-6">
    User Login
  </h2>

  <form method="post" class="space-y-4">

    <div>
      <label class="block text-sm font-medium mb-1">Username</label>
      <input type="text" name="username" required
             class="w-full border px-3 py-2 rounded-lg
                    focus:ring-2 focus:ring-indigo-400 outline-none">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" name="password" placeholder="given password" required
             class="w-full border px-3 py-2 rounded-lg
                    focus:ring-2 focus:ring-indigo-400 outline-none">
    </div>

    <div>
      <a href="verify_otp_new_pass.html">forget password</a>
    </div>

    <button type="submit"
            class="w-full py-2 rounded-lg text-white font-semibold
                   bg-gradient-to-r from-orange-500 to-yellow-500
                   hover:from-yellow-500 hover:to-orange-500">
      Login
    </button>

  </form>

</div>
</body>
</html>
