{% extends "base.html" %}
{% block title %}Edit Contribution Type | Eknal Technologies{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="bg-white/80 backdrop-blur border rounded-2xl shadow-xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-indigo-700">Edit Contribution Type</h2>
    <form method="post" class="space-y-5">

  <input type="hidden"
         name="csrf_token"
         value="{{ csrf_token() }}">

  <div>
    <label for="name"
           class="block text-sm font-medium mb-2">
      Contribution Type Name
    </label>
        <input type="text" name="name" id="name" value="{{ ctype.name }}" required placeholder="Enter contribution type" class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <div class="flex justify-end gap-3">
        <a href="{{ url_for('contribution_types') }}" class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">Back</a>
        <button type="submit" class="px-5 py-2 rounded-lg bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold hover:opacity-90 transition">Update</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
