{% extends "base.html" %}
{% block title %}Request Password Change | Eknal Technologies{% endblock %}
{% block content %}
<div class="flex-grow flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="bg-white/80 backdrop-blur rounded-2xl shadow-xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-indigo-700 text-center mb-2">Request Password Change</h2>
    <p class="text-center text-gray-600 mb-6">Enter your registered email to receive OTP</p>
    <form method="post"
      class="space-y-5"
      id="otpForm">

  <input type="hidden"
         name="csrf_token"
         value="{{ csrf_token() }}">

  <div>
    <label for="email"
           class="block text-sm font-medium mb-2">
      Registered Email
    </label>
        <input type="email" name="email" id="email" required placeholder="you@example.com" class="w-full border px-4 py-3 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none text-center">
      </div>
      <button id="sendBtn" type="submit" class="w-full py-3 rounded-xl font-semibold text-white bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500 hover:from-yellow-500 hover:via-orange-500 hover:to-amber-500 transition flex items-center justify-center gap-2">
        <span id="btnText">Send OTP</span>
        <svg id="spinner" class="hidden w-5 h-5 animate-spin text-white" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" opacity="0.25"></circle>
          <path fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
        </svg>
      </button>
      <p class="text-xs text-gray-500 text-center">This may take a few seconds</p>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  const form = document.getElementById("otpForm");
  const btn = document.getElementById("sendBtn");
  const text = document.getElementById("btnText");
  const spinner = document.getElementById("spinner");
  if (form) {
    form.addEventListener("submit", () => {
      btn.disabled = true;
      btn.classList.add("opacity-70", "cursor-not-allowed");
      text.textContent = "Sending OTP...";
      spinner.classList.remove("hidden");
    });
  }
</script>
{% endblock %}
