<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit File</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center
             bg-gradient-to-b from-blue-50 via-white to-indigo-100
             text-gray-900 relative overflow-hidden">

<!-- Background pattern -->
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]
            opacity-10 pointer-events-none"></div>

<!-- Card -->
<div class="relative z-10 w-full max-w-md
            bg-white/80 backdrop-blur
            rounded-2xl shadow-xl p-8">

  <!-- Title -->
  <h2 class="text-2xl font-bold text-indigo-700 text-center mb-2">
    Edit File
  </h2>

  <p class="text-sm text-gray-600 text-center mb-6">
    Update your file title below
  </p>

  <!-- Form -->
  <form method="POST" class="space-y-5">

    <input
      type="text"
      name="title"
      value="{{ file.title }}"
      placeholder="File Title"
      required
      class="w-full px-4 py-3 rounded-lg border
             focus:ring-2 focus:ring-indigo-400
             outline-none text-sm"
    >

    <button
      type="submit"
      class="w-full py-3 rounded-xl font-semibold text-white
             bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500
             hover:from-yellow-500 hover:via-orange-500 hover:to-amber-500
             transition"
    >
      Save Changes
    </button>

  </form>

  <!-- Back -->
  <div class="text-center mt-6">
    <a href="{{ url_for('dashboard') }}"
       class="text-indigo-600 font-medium hover:underline">
      Back to Dashboard
    </a>
  </div>

</div>
<script>
const toast = document.getElementById("toast");

if (toast) {
  setTimeout(() => {
    toast.classList.remove("opacity-0", "scale-95", "translate-y-4");
  }, 100);

  setTimeout(() => {
    toast.classList.add("opacity-0");
  }, 2500);

  setTimeout(() => {
    toast.remove();
  }, 3000);
}
</script>
</body>
</html>
