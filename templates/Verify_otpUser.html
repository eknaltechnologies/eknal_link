{% extends "base.html" %}
{% block title %}Verify OTP | Eknal Technologies{% endblock %}
{% block content %}
<div class="flex-grow flex items-center justify-center px-4 pt-24 pb-12 relative z-10">
  <div class="bg-white/80 backdrop-blur rounded-2xl shadow-xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-indigo-700 text-center mb-2">Enter OTP</h2>
    <p class="text-center text-gray-600 mb-6">Enter the OTP sent to your email</p>
    <form method="post" class="space-y-4">
      <div><label for="otp" class="sr-only">OTP Code</label>
        <input type="text" name="otp" id="otp" maxlength="6" required autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]{6}" placeholder="------" class="w-full border px-3 py-3 rounded-lg text-center tracking-widest text-lg focus:ring-2 focus:ring-indigo-400 outline-none">
      </div>
      <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white bg-gradient-to-r from-orange-500 via-amber-500 to-yellow-500 hover:from-yellow-500 hover:via-orange-500 hover:to-amber-500 transition">Verify OTP</button>
    </form>
    <div class="mt-4 text-center">
      <a href="{{ url_for('forgot_password') }}" class="text-sm text-indigo-600 hover:underline">← Back</a>
    </div>
  </div>
</div>
{% endblock %}
