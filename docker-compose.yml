version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - REDIS_SERVER_NUMBER=redis
      - REDIS_PORT_NUMBER=6379
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./instance:/app/instance
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  redis_data: